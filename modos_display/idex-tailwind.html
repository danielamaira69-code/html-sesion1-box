<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <h1>INLINE:</h1>
    <div class="inline bg-pink-300 text-black">
        Producto
    </div> 

    <div class="inline bg-indigo-300 text-black">
        Nosotros 
    </div>

    <div class="inline bg-blue-300 text-black">
        Servicios
    </div>
    
    <div class="inline bg-green-200 text-black">
        Contacto
    </div>
    <hr>
    <h1>BLOCK:</h1>
</body>
    <div class="block bg-red-200 w-[200px] h-[150px] text-red-400">
        Producto
    </div> 

    <div class="block bg-yellow-200 w-[200px] h-[150px] text-yellow-600">
        Nosotros 
    </div>

    <div class="block bg-emerald-200 w-[200px] h-[150px] text-emerald-600">
        Servicios
    </div>
    
    <div class="block bg-violet-300  w-[200px] h-[150px] text-violet-600">
        Contacto
    </div>

</body>
</html>
