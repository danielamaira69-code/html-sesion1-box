<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .elemento{
            display: inline;
            background-color: rgb(240, 180, 225);
            color: rgb(22, 22, 29);
        
        }
        .elemento_block{
            display: block;
            background-color: rgb(189, 208, 212);
            color: rgb(172, 31, 31);
            width: 200px;
            height: 200px;
        }


        .resaltado{
            color: rgb(0, 0, 0);
            letter-spacing: 2p;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: large;
            font-weight: bold;
        }


    </style>
</head>
<body>
    <h1>INLINE:</h1>
    <div class="elemento resaltado">
        Producto
    </div> 

    <div class="elemento">
        Nosotros 
    </div>

    <div class="elemento resaltado">
        Servicios
    </div>
    
    <div class="elemento ">
        Contacto
    </div>

    <h1>BLOCK:</h1>
    <body>
    <div class="elemento_block">
        Producto
    </div> 

    <div class="elemento_block">
        Nosotros 
    </div>

    <div class="elemento_block">
        Servicios
    </div>
    
    <div class="elemento_block">
        Contacto
    </div>

</body>
</html>
